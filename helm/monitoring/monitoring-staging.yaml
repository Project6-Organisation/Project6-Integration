grafana:
  enabled: true

  adminPassword: admin

  ingress:
    enabled: true

    ingressClassName: alb

    hosts:
      - microcrm-grafana.staging.olivierpflieger.fr

    path: /

    pathType: Prefix

    annotations:
      alb.ingress.kubernetes.io/scheme: internet-facing
      alb.ingress.kubernetes.io/target-type: ip
      alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80},{"HTTPS":443}]'
      alb.ingress.kubernetes.io/ssl-redirect: "443"
      alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:us-east-1:161438779240:certificate/af9ef7c4-5e92-4323-a81d-b19f549d7e4b

prometheusOperator:
  admissionWebhooks:
    enabled: false