grafana:
  enabled: true
  
  ingress:
    enabled: true

    ingressClassName: alb

    hosts:
      - microcrm-grafana.prod.olivierpflieger.fr

    path: /

    pathType: Prefix

    annotations:
      alb.ingress.kubernetes.io/scheme: internet-facing
      alb.ingress.kubernetes.io/target-type: ip
      alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80},{"HTTPS":443}]'
      alb.ingress.kubernetes.io/ssl-redirect: "443"
      alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:us-east-1:161438779240:certificate/af9ef7c4-5e92-4323-a81d-b19f549d7e4b

  dashboards:
    default:
      kubernetes-global:
        file: dashboards/k8s-global-views.json
      kubernetes-namespaces:
        file: dashboards/k8s-view-namespaces.json
      kubernetes-nodes:
        file: dashboards/k8s-view-nodes.json
      kubernetes-pods:
        file: dashboards/k8s-view-pods.json
      dashboard-oc:
        file: dashboards/dashboard-oc.json
      dashboard-dora:
        file: dashboards/dashboard-dora.json

  grafana.ini:
    smtp:
      enabled: true
      host: live.smtp.mailtrap.io:587
      user: $__env{SMTP_USER}
      password: $__env{SMTP_PASSWORD}
      from_address: hello@demomailtrap.co
      from_name: Grafana Alerts
      startTLS_policy: MandatoryStartTLS

  envFromSecret: grafana-smtp-secret

  alerting:
    contactpoints.yaml:
      apiVersion: 1
      contactPoints:
        - orgId: 1
          name: email-devops
          receivers:
            - uid: email-devops
              type: email
              settings:
                addresses: keryss@gmail.com
                singleEmail: false

    policies.yaml:
      apiVersion: 1
      policies:
        - orgId: 1
          receiver: email-devops
          group_by:
            - grafana_folder
            - alertname
          group_wait: 30s
          group_interval: 5m
          repeat_interval: 4h

    rules.yaml:
      apiVersion: 1
      groups:
        - orgId: 1
          name: kubernetes-alerts
          folder: Kubernetes
          interval: 1m
          rules:
            - uid: pod-memory-usage-high
              title: Pod Memory Usage High
              condition: C
              data:
                - refId: A
                  relativeTimeRange:
                    from: 300
                    to: 0
                  datasourceUid: prometheus
                  model:
                    expr: |
                      100 *
                      container_memory_working_set_bytes{namespace=~"microcrm-.*", container!="", image!=""}
                      /
                      kube_pod_container_resource_limits{namespace=~"microcrm-.*", resource="memory", container!=""}
                    refId: A
                    instant: true

                - refId: B
                  datasourceUid: __expr__
                  model:
                    type: reduce
                    expression: A
                    reducer: max
                    refId: B

                - refId: C
                  datasourceUid: __expr__
                  model:
                    type: threshold
                    expression: B
                    conditions:
                      - evaluator:
                          type: gt
                          params: [0]
                        operator:
                          type: and
                        reducer:
                          type: last
                        type: query
                    refId: C

              noDataState: OK
              execErrState: Error
              for: 30s
              annotations:
                summary: "RAM pod supérieure au seuil"
                description: "Un container applicatif dépasse le seuil RAM configuré."
              labels:
                severity: warning
                team: devops

prometheusOperator:
  admissionWebhooks:
    enabled: false
    patch:
      enabled: false
  tls:
    enabled: false

prometheus:
  prometheusSpec:
    retention: 5d
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: gp2
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 1Gi