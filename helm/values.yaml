namespace: microcrm

backend:
  image:
    repository: ghcr.io/project6-organisation/project6-application/backend
    tag: v1.6.0
    pullPolicy: IfNotPresent

  replicas: 1

  containerPort: 8080

  service:
    type: ClusterIP
    port: 80

frontend:
  image:
    repository: ghcr.io/project6-organisation/project6-application/frontend
    tag: v1.6.0
    pullPolicy: IfNotPresent

  replicas: 1

  containerPort: 80

  service:
    type: ClusterIP
    port: 80

ingress:
  enabled: false
  host: ""
  apiHost: ""
  baseDomain: ""
  certificateArn: ""
