{{- if .Values.ingress.enabled }}

apiVersion: networking.k8s.io/v1
kind: Ingress

metadata:
  name: microcrm-ingress
  namespace: {{ .Values.namespace }}

  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip

    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS":443}]'

    alb.ingress.kubernetes.io/certificate-arn: {{ .Values.ingress.certificateArn }}

spec:
  ingressClassName: alb

  rules:
    - host: {{ .Values.ingress.host }}.{{ .Values.ingress.baseDomain }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: microcrm-frontend-service
                port:
                  number: 80

    - host: {{ .Values.ingress.apiHost }}.{{ .Values.ingress.baseDomain }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: microcrm-backend-service
                port:
                  number: 80

{{- end }}