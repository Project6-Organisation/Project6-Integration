name: Deployment infrastructure

on:
  workflow_call:
    
    secrets:
        AWS_ACCESS_KEY_ID:
          required: true
        AWS_SECRET_ACCESS_KEY:
          required: true
      
    inputs:
      action:
        required: true
        type: string   
      environment:
        required: true
        type: string

permissions:
  contents: read

jobs:

  Check-variables:
    
    runs-on: [self-hosted, project6]
    # runs-on: ubuntu-latest
    
    steps:      
      
      - name: Check action
        run: |
          echo "Action: ${{ inputs.action }}"
          if [ "${{ inputs.action }}" != "plan" ] \
            && [ "${{ inputs.action }}" != "apply" ] \
            && [ "${{ inputs.action }}" != "plan-destroy" ] \
            && [ "${{ inputs.action }}" != "destroy" ]; then
            echo "Invalid action: ${{ inputs.action }}"
            echo "Allowed values: plan, apply, plan-destroy, destroy"
            exit 1
          fi

      - name: Check environment
        run: |
          echo "Environment: ${{ inputs.environment }}"
          if [ "${{ inputs.environment }}" != "staging" ] && [ "${{ inputs.environment }}" != "prod" ]; then
            echo "Invalid environment: ${{ inputs.environment }}"
            echo "Allowed values: staging, prod"
            exit 1
          fi

  create-infra:

    needs: Check-variables
    if: inputs.action == 'plan' || inputs.action == 'apply'

    runs-on: [self-hosted, project6]
    # runs-on: ubuntu-latest
    
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: us-east-1
      AWS_DEFAULT_REGION: us-east-1

    defaults:
      run:
        working-directory: integration/infra/eks

    steps:

      - name: Checkout integration repository
        uses: actions/checkout@v4
        with:
          repository: Project6-Organisation/Project6-Integration
          path: integration
      
      - name: Create bucket to store state (if not exists)
        run: |
          aws s3api head-bucket \
            --bucket project6-terraform-state-230620261146 \
            2>/dev/null \
            || aws s3 mb s3://project6-terraform-state-230620261146 --region us-east-1

      - name: Create bucket to store loki (if not exists)
        run: |
          aws s3api head-bucket \
            --bucket project6-terraform-loki-${{ inputs.environment }}-230620261146 \
            2>/dev/null \
            || aws s3 mb s3://project6-terraform-loki-${{ inputs.environment }}-230620261146 --region us-east-1
      
      - name: Terraform init
        run: |
          terraform init \
            -backend-config="key=eks/${{ inputs.environment }}/terraform.tfstate"
      
      - name: Terraform format
        run: terraform fmt

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        if: inputs.action == 'plan' || inputs.action == 'apply'
        run: terraform plan -var-file="envs/${{ inputs.environment }}.tfvars" -out=tfplan
      
      - name: Terraform apply
        if: inputs.action == 'apply'
        run: terraform apply -auto-approve tfplan
      
  deploy-addons:

    needs: create-infra
    if: inputs.action == 'apply'

    runs-on: [self-hosted, project6]
    # runs-on: ubuntu-latest

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: us-east-1
      AWS_DEFAULT_REGION: us-east-1

    defaults:
      run:
        working-directory: integration/infra/eks

    steps:
      - name: Checkout integration repository
        uses: actions/checkout@v4
        with:
          repository: Project6-Organisation/Project6-Integration
          path: integration

      - name: Terraform init
        run: |
          terraform init \
            -backend-config="key=eks/${{ inputs.environment }}/terraform.tfstate"

      - name: Export Terraform outputs
        run: |
          echo "VPC_ID=$(terraform output -raw vpc_id)" >> $GITHUB_ENV
          echo "ALB_CONTROLLER_ROLE_ARN=$(terraform output -raw aws_load_balancer_controller_role_arn)" >> $GITHUB_ENV

      - name: Show Terraform outputs
        run: |
          echo "Cluster : project6-eks-${{ inputs.environment }}"
          echo "Region  : $AWS_REGION"
          echo "VPC ID  : $VPC_ID"
          echo "Role ARN: $ALB_CONTROLLER_ROLE_ARN"
      
      - name: Configure kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region $AWS_REGION \
            --name project6-eks-${{ inputs.environment }}

      - name: Deploy AWS Load Balancer Controller
        run: |
          helm repo add eks https://aws.github.io/eks-charts
          helm repo update

          helm upgrade --install aws-load-balancer-controller eks/aws-load-balancer-controller \
            -n kube-system \
            --set clusterName=project6-eks-${{ inputs.environment }} \
            --set region=$AWS_REGION \
            --set vpcId=$VPC_ID \
            --set serviceAccount.create=true \
            --set serviceAccount.name=aws-load-balancer-controller \
            --set serviceAccount.annotations."eks\.amazonaws\.com/role-arn"=$ALB_CONTROLLER_ROLE_ARN \
            --wait \
            --timeout 5m

      - name: Check AWS Load Balancer Controller
        run: |
          kubectl get deployment -n kube-system aws-load-balancer-controller
          kubectl get pods -n kube-system | grep aws-load-balancer-controller

  plan-destroy:

    needs: Check-variables
    if: inputs.action == 'plan-destroy'

    runs-on: [self-hosted, project6]
    # runs-on: ubuntu-latest

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: us-east-1
      AWS_DEFAULT_REGION: us-east-1

    defaults:
      run:
        working-directory: integration/infra/eks

    steps:
      - name: Checkout integration repository
        uses: actions/checkout@v4
        with:
          repository: Project6-Organisation/Project6-Integration
          path: integration

      - name: Terraform init
        run: |
          terraform init \
            -backend-config="key=eks/${{ inputs.environment }}/terraform.tfstate"

      - name: Terraform destroy plan
        run: |
          terraform plan \
            -destroy \
            -var-file="envs/${{ inputs.environment }}.tfvars" \
            -out=destroy.tfplan

      - name: Show destroy summary
        run: |
          echo "## Destroy plan" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          terraform show -no-color destroy.tfplan > destroy.txt

          DESTROY_COUNT=$(grep -c "^  #" destroy.txt || true)

          echo "Resources to destroy: **$DESTROY_COUNT**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo '```' >> $GITHUB_STEP_SUMMARY
          grep "^  #" destroy.txt >> $GITHUB_STEP_SUMMARY || true
          echo '```' >> $GITHUB_STEP_SUMMARY
  
  cleanup-addons:

    needs: Check-variables
    if: inputs.action == 'destroy'

    runs-on: [self-hosted, project6]
    # runs-on: ubuntu-latest

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: us-east-1
      AWS_DEFAULT_REGION: us-east-1

    steps:
      - name: Configure kubeconfig
        continue-on-error: true
        run: |
          aws eks update-kubeconfig \
            --region $AWS_REGION \
            --name project6-eks-${{ inputs.environment }}

      - name: Uninstall Helm microcrm
        continue-on-error: true
        run: |
          helm uninstall microcrm -n microcrm-${{ inputs.environment }} || true

      - name: Delete namespace Helm microcrm
        continue-on-error: true
        run: |
          kubectl delete namespace microcrm-${{ inputs.environment }} \
            --ignore-not-found=true

      - name: Uninstall Helm monitoring
        continue-on-error: true
        run: |
          helm uninstall monitoring -n monitoring || true
          helm uninstall loki -n monitoring || true

      - name: Delete namespace Helm monitoring
        continue-on-error: true
        run: |
          kubectl delete namespace monitoring --ignore-not-found=true
      
      - name: Wait for AWS LoadBalancer cleanup
        run: |
          echo "Waiting for LoadBalancer cleanup..."
          sleep 120

          aws elbv2 describe-load-balancers \
            --region $AWS_REGION \
            --query "LoadBalancers[*].[LoadBalancerName,DNSName,State.Code]" \
            --output table || true

      - name: Uninstall AWS Load Balancer Controller
        continue-on-error: true
        run: |
          helm uninstall aws-load-balancer-controller \
            -n kube-system || true

  destroy-infra:

    needs: cleanup-addons
    if: inputs.action == 'destroy'

    runs-on: [self-hosted, project6]
    # runs-on: ubuntu-latest

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: us-east-1
      AWS_DEFAULT_REGION: us-east-1

    defaults:
      run:
        working-directory: integration/infra/eks

    steps:
      - name: Checkout integration repository
        uses: actions/checkout@v4
        with:
          repository: Project6-Organisation/Project6-Integration
          path: integration

      - name: Terraform init
        run: |
          terraform init \
            -backend-config="key=eks/${{ inputs.environment }}/terraform.tfstate"

      - name: Terraform destroy
        run: |
          terraform destroy \
            -var-file="envs/${{ inputs.environment }}.tfvars" \
            -auto-approve