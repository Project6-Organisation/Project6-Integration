name: BackEnd_docker_Build

on:
  workflow_call:
    inputs:
      image_tag:
        required: true
        type: string
      is_release:
        required: true
        type: string

permissions:
  contents: write
  packages: write
  issues: write
  pull-requests: read

jobs:
  BackEnd_docker_Build:

    runs-on: [self-hosted, project6]
    # runs-on: ubuntu-latest
        
    steps:
      - uses: actions/checkout@v4

      - name: Assign and display image name
        run: |
          echo "inputs.image_tag: ${{ inputs.image_tag }}"
          echo "inputs.is_release: ${{ inputs.is_release }}"
          echo "IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY,,}/backend" >> $GITHUB_ENV
          echo "IMAGE_TAG=${{ inputs.image_tag }}" >> $GITHUB_ENV
            
      - name: Login to GitHub Container Registry
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io \
            -u "${{ github.actor }}" \
            --password-stdin

      - name: Build Docker image
        run: |
          docker build \
            --target back \
            -t "$IMAGE_NAME:$IMAGE_TAG" \
            -t "$IMAGE_NAME:latest" \
            .

      - name: Push Docker image
        run: |
          docker push "$IMAGE_NAME:$IMAGE_TAG"
          docker push "$IMAGE_NAME:latest"

      - name: Show pushed image
        run: |
          echo "Pushed image: $IMAGE_NAME:$IMAGE_TAG"
          echo "Pushed image: $IMAGE_NAME:latest"  
