name: Deployment application

on:
  workflow_call:
    
    secrets:
        AWS_ACCESS_KEY_ID:
          required: true
        AWS_SECRET_ACCESS_KEY:
          required: true
      
    inputs:
      environment:
        required: true
        type: string
      image_tag:
        required: true
        type: string

permissions:
  contents: read
  packages: read
  issues: write

jobs:
  
  deploy-monitoring:

    runs-on: [self-hosted, project6]
    # runs-on: ubuntu-latest
    
    name: Deploy Monitoring Stack

    environment: ${{ inputs.environment }}

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: ${{ vars.AWS_REGION }}
      AWS_DEFAULT_REGION: ${{ vars.AWS_DEFAULT_REGION }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout integration repository
        uses: actions/checkout@v4
        with:
          repository: Project6-Organisation/Project6-Integration
          path: integration

      - name: Configure kubeconfig for EKS
        run: |
          aws eks update-kubeconfig --region $AWS_REGION --name project6-eks-${{ inputs.environment }}

      - name: Add Helm repositories (grafana/loki and prometheus-community)
        run: |
          helm repo add grafana https://grafana.github.io/helm-charts
          helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
          helm repo update

      - name: Create monitoring namespace
        run: |
          kubectl create namespace monitoring --dry-run=client -o yaml | kubectl apply -f -

      - name: Install Loki
        run: |
          helm upgrade --install loki grafana/loki \
            --namespace monitoring \
            -f integration/helm/monitoring/loki-values.yaml

      - name: Install Promtail
        run: |
          helm upgrade --install promtail grafana/promtail \
            --namespace monitoring \
            -f integration/helm/monitoring/promtail-values.yaml

      - name: Create Grafana dashboards ConfigMaps
        run: |
          for dashboard in integration/helm/monitoring/dashboards/*.json; do
            name=$(basename "$dashboard" .json)

            kubectl create configmap "grafana-dashboard-$name" \
              --from-file="$dashboard" \
              -n monitoring \
              --dry-run=client -o yaml \
              | kubectl label --local -f - grafana_dashboard=1 -o yaml \
              > "/tmp/grafana-dashboard-$name.yaml"

            kubectl replace -f "/tmp/grafana-dashboard-$name.yaml" || \
            kubectl create -f "/tmp/grafana-dashboard-$name.yaml"
          done

      - name: Install Prometheus and Grafana
        run: |
          helm upgrade --install monitoring prometheus-community/kube-prometheus-stack \
            --namespace monitoring \
            -f integration/helm/monitoring/monitoring-${{ inputs.environment }}.yaml \
            --set grafana.adminPassword="${{ secrets.GRAFANA_ADMIN_PWD }}"

      - name: Display Grafana URL
        run: |
          echo "Waiting for Grafana Ingress ALB URL..."

          GRAFANA_INGRESS_URL=""

          for i in {1..30}; do
            GRAFANA_INGRESS_URL=$(kubectl get ingress monitoring-grafana \
              -n monitoring \
              -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')

            if [ -n "$GRAFANA_INGRESS_URL" ]; then
              break
            fi

            echo "Grafana Ingress ALB not ready yet... retry $i/30"
            sleep 10
          done

          if [ -z "$GRAFANA_INGRESS_URL" ]; then
            echo "Grafana Ingress ALB URL not found"
            kubectl describe ingress monitoring-grafana -n monitoring
            exit 1
          fi

          GRAFANA_URL="https://microcrm-grafana.${{ inputs.environment }}.${{ vars.BASE_DOMAIN }}"

          echo "Grafana ALB URL: https://$GRAFANA_INGRESS_URL"
          echo "Grafana URL: $GRAFANA_URL"

          echo "### Monitoring deployed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Grafana ALB URL: https://$GRAFANA_INGRESS_URL" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Grafana URL: $GRAFANA_URL" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "OVH domain configuration: edit DNS record (CNAME)" >> $GITHUB_STEP_SUMMARY
          echo "microcrm-grafana.${{ inputs.environment }} => $GRAFANA_INGRESS_URL." >> $GITHUB_STEP_SUMMARY
          
      - name: Check monitoring
        run: |
          kubectl get pods -n monitoring
          kubectl get svc -n monitoring

  deploy-helm:

    needs: deploy-monitoring
    
    runs-on: [self-hosted, project6]
    # runs-on: ubuntu-latest

    environment: ${{ inputs.environment }}

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: ${{ vars.AWS_REGION }}
      AWS_DEFAULT_REGION: ${{ vars.AWS_DEFAULT_REGION }}
      BASE_DOMAIN: ${{ vars.BASE_DOMAIN }}

    steps:

      - name: Checkout integration repository
        uses: actions/checkout@v4
        with:
          repository: Project6-Organisation/Project6-Integration
          path: integration
      
      - name: Check environment
        run: |
          echo "Environment: ${{ inputs.environment }}"
          if [ "${{ inputs.environment }}" != "staging" ] && [ "${{ inputs.environment }}" != "prod" ]; then
            echo "Invalid environment: ${{ inputs.environment }}"
            echo "Allowed values: staging, prod"
            exit 1
          fi

      - name: Check image tag
        run: |
          echo "Image Tag: ${{ inputs.image_tag }}"
          if [ "${{ inputs.image_tag }}" = "" ]; then
            echo "Invalid image tag: ${{ inputs.image_tag }}"
            exit 1
          fi

      - name: Display environment variables
        run: |
          echo "AWS_REGION: $AWS_REGION"
          echo "AWS_DEFAULT_REGION: $AWS_DEFAULT_REGION"

      - name: Configure kubeconfig for EKS
        run: |
          aws eks update-kubeconfig --region $AWS_REGION --name project6-eks-${{ inputs.environment }}

      - name: Check cluster access
        run: |
          kubectl get nodes

      - name: Deploy application with Helm
        run: |
          helm upgrade --install microcrm integration/helm \
            -f integration/helm/values-${{ inputs.environment }}.yaml \
            --namespace microcrm-${{ inputs.environment }} \
            --create-namespace \
            --set backend.image.tag=${{ inputs.image_tag }} \
            --set frontend.image.tag=${{ inputs.image_tag }} \
            --set ingress.baseDomain=$BASE_DOMAIN \
            --atomic \
            --wait \
            --timeout 10m

      - name: Display application URL
        run: |
          echo "Waiting for Ingress ALB URL..."

          INGRESS_URL=""

          for i in {1..30}; do
            INGRESS_URL=$(kubectl get ingress microcrm-ingress \
              -n microcrm-${{ inputs.environment }} \
              -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')

            if [ -n "$INGRESS_URL" ]; then
              break
            fi

            echo "Ingress ALB not ready yet... retry $i/30"
            sleep 10
          done

          if [ -z "$INGRESS_URL" ]; then
            echo "Ingress ALB URL not found"
            kubectl describe ingress microcrm-ingress -n microcrm-${{ inputs.environment }}
            exit 1
          fi

          echo "ALB URL: https://$INGRESS_URL"
          APP_URL="https://microcrm.${{ inputs.environment }}.$BASE_DOMAIN"
          echo "Application URL: $APP_URL"
          echo "### Application deployed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "ALB URL: https://$INGRESS_URL" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Application URL: $APP_URL" >> $GITHUB_STEP_SUMMARY
          echo "API URL: $APP_URL/api" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "OVH domain configuration: edit DNS record (CNAME)" >> $GITHUB_STEP_SUMMARY
          echo "microcrm.${{ inputs.environment }} => $INGRESS_URL." >> $GITHUB_STEP_SUMMARY

      - name: Check deployment
        run: |
          kubectl get pods -n microcrm-${{ inputs.environment }}
          kubectl get svc -n microcrm-${{ inputs.environment }}

      - name: Cleanup GHCR package versions - keep last 5
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ORG: Project6-Organisation
          PACKAGE_NAME: backend # ou frontend
          KEEP_LAST: 5
        run: |
          echo "Cleaning package: $PACKAGE_NAME"

          VERSION_IDS=$(gh api \
            "/orgs/$ORG/packages/container/$PACKAGE_NAME/versions?per_page=100" \
            --jq "sort_by(.created_at) | reverse | .[$KEEP_LAST:] | .[].id")

          if [ -z "$VERSION_IDS" ]; then
            echo "Nothing to delete. 5 or fewer versions found."
            exit 0
          fi

          for VERSION_ID in $VERSION_IDS; do
            echo "Deleting version id: $VERSION_ID"
            gh api \
              --method DELETE \
              "/orgs/$ORG/packages/container/$PACKAGE_NAME/versions/$VERSION_ID"
          done
      
  zap_scan-BackEnd:
  
    runs-on: [self-hosted, project6]
    # runs-on: ubuntu-latest
    
    name: Scan the BackEnd application with OWASP ZAP

    needs: deploy-helm

    environment: ${{ inputs.environment }}

    env:
      BASE_DOMAIN: ${{ vars.BASE_DOMAIN }}

    # Desactivation temporaire du build
    if: false
    # if: inputs.environment == 'staging'
    # End desactivation temporaire du build
  
    steps:

      - name: Show URL to scan
        run: |
          echo "URL to scan : https://microcrm-api.${{ inputs.environment }}.${{ vars.BASE_DOMAIN }}"

      - name: Checkout
        uses: actions/checkout@v4
      - name: ZAP Scan
        uses: zaproxy/action-full-scan@v0.13.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          target: "https://microcrm-api.${{ inputs.environment }}.${{ vars.BASE_DOMAIN }}"
          docker_name: zaproxy/zap-stable
          fail_action: false
          artifact_name: "zap_report_backend.html"

  zap_scan-FrontEnd:
  
    runs-on: [self-hosted, project6]
    # runs-on: ubuntu-latest
    
    name: Scan the FrontEnd application with OWASP ZAP

    needs: deploy-helm

    environment: ${{ inputs.environment }}

    env:
      BASE_DOMAIN: ${{ vars.BASE_DOMAIN }}

    # Desactivation temporaire du build
    if: false
    # if: inputs.environment == 'staging'
    # End desactivation temporaire du build
  
    steps:

      - name: Show URL to scan
        run: |
          echo "URL to scan : https://microcrm.${{ inputs.environment }}.${{ vars.BASE_DOMAIN }}"

      - name: Checkout
        uses: actions/checkout@v4
      - name: ZAP Scan
        uses: zaproxy/action-full-scan@v0.13.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          target: "https://microcrm.${{ inputs.environment }}.${{ vars.BASE_DOMAIN }}"
          docker_name: zaproxy/zap-stable
          fail_action: false
          artifact_name: "zap_report_frontend.html"