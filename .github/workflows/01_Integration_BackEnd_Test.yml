name: 01_Integration_BackEnd_Tests

on:
  workflow_call:

jobs:
  BackEnd_Test:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Cache Gradle
        uses: actions/cache@v4
        if: success()
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      - name: Run Gradle tests        
        if: success()
        run: |
          echo "Running Gradle tests"
          chmod +x ./gradlew
          ./gradlew clean test