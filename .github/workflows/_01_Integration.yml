name: Integration

on:
  workflow_call:
    secrets:
        SONAR_TOKEN_BACKEND:
          required: false
        SONAR_TOKEN_FRONTEND:
          required: false
        SNYK_TOKEN:
          required: false
        SNYK_ORG_ID:
          required: false
    inputs:
      origin:
        required: false
        type: string

permissions:
  contents: write
  packages: write
  issues: write
  pull-requests: read
  
jobs:
  Check-variables:
    runs-on: ubuntu-latest
    steps:      
            
      - name: Show trigger type
        run: |
          echo "Triggered by: ${{ github.event_name }}"
      
      - name: Show caller & called workflow branch
        run: |
          if [ "${{ inputs.origin }}" == "manual-trigger" ]; then
            echo "Caller branch: ${{ github.ref_name }}"
            echo "Called pipeline branch: develop"
          else
            echo "Caller branch: ${{ github.ref_name }}"
            echo "Called pipeline branch: main"
          fi

      - name: Check SonarQube token
        env:
          SONAR_TOKEN_BACKEND: ${{ secrets.SONAR_TOKEN_BACKEND }}
          SONAR_TOKEN_FRONTEND: ${{ secrets.SONAR_TOKEN_FRONTEND }}
        run: |
          [ -n "$SONAR_TOKEN_BACKEND" ] && echo "SONAR_TOKEN_BACKEND OK" || echo "SONAR_TOKEN_BACKEND IS MISSING"
          [ -n "$SONAR_TOKEN_FRONTEND" ] && echo "SONAR_TOKEN_FRONTEND OK" || echo "SONAR_TOKEN_FRONTEND IS MISSING"

  BackEnd_Build:
    uses: ./.github/workflows/01_1_BackEnd_Build.yml
    secrets: inherit
    
  BackEnd_Test:
    needs:
      - BackEnd_Build
    uses: ./.github/workflows/01_2_BackEnd_Test.yml
    secrets: inherit

  BackEnd_SonarQube:
    if: |
      github.ref_name == 'develop'
    needs:
      - BackEnd_Test
    uses: ./.github/workflows/01_3_BackEnd_SonarQube.yml
    secrets: inherit
    
  FrontEnd_Build:
    uses: ./.github/workflows/01_4_FrontEnd_Build.yml
    secrets: inherit

  FrontEnd_Test:
    needs:
      - FrontEnd_Build
    uses: ./.github/workflows/01_5_FrontEnd_Test.yml
    secrets: inherit

  FrontEnd_SonarQube:
    if: |
      github.ref_name == 'develop'
    needs:
      - FrontEnd_Test
    uses: ./.github/workflows/01_6_FrontEnd_SonarQube.yml
    secrets: inherit

  Snyk_Scan:
    needs:
      - BackEnd_Build
      - FrontEnd_Build
    uses: ./.github/workflows/01_7_Snyk.yml
    secrets: inherit

  CI_Status:
    name: CI Status
    runs-on: ubuntu-latest

    needs:
      - BackEnd_Build
      - BackEnd_Test
      - FrontEnd_Build
      - FrontEnd_Test
      - BackEnd_SonarQube
      - FrontEnd_SonarQube
      - Snyk_Scan

    if: always()

    steps:
      - run: echo "All checks passed"

  Semantic-Release:

    if: |
      github.event_name == 'pull_request' &&
      github.base_ref == 'main' &&
      github.head_ref == 'develop'

    runs-on: ubuntu-latest
    needs: CI_Status

    outputs:
      is_release: ${{ steps.compute-image-tag.outputs.is_release }}
      release_version: ${{ steps.semantic-release.outputs.new_release_version }}
      release_major_version: ${{ steps.semantic-release.outputs.new_release_major_version }}
      image_tag: ${{ steps.compute-image-tag.outputs.image_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Semantic Release
        id: semantic-release        
        uses: cycjimmy/semantic-release-action@v6
        with:
          extra_plugins: |
            @semantic-release/changelog
            @semantic-release/git
            @semantic-release/github
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
           
      - name: Compute image tag
        id: compute-image-tag
        run: |
          branch="${GITHUB_REF_NAME//\//-}"
          sha="${GITHUB_SHA::7}"

          if [ "${{ steps.semantic-release.outputs.new_release_published }}" = "true" ]; then
            image_tag="v${{ steps.semantic-release.outputs.new_release_version }}"
            is_release="true"
          else
            image_tag="${branch}-${sha}"
            is_release="false"
          fi

          echo "image_tag=$image_tag" >> "$GITHUB_OUTPUT"
          echo "is_release=$is_release" >> "$GITHUB_OUTPUT"

      - name: Display computed outputs
        run: |
          echo "image_tag = ${{ steps.compute-image-tag.outputs.image_tag }}"
          echo "is_release = ${{ steps.compute-image-tag.outputs.is_release }}"

