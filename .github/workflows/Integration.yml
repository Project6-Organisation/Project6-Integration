name: Integration

on:
  workflow_call:

permissions:
  contents: write
  packages: write
  issues: write
  pull-requests: read
  
jobs:
  Check-variables:
    runs-on: ubuntu-latest
    steps:      
            
      - name: Show trigger type
        run: |
          echo "Triggered by: ${{ github.event_name }}"
      
      - name: Show caller & called workflow branch
        run: |
          echo "Caller branch: ${{ github.ref_name }}"
          echo "Called workflow branch: develop"      

  BackEnd_Test:    
    uses: ./.github/workflows/Integration_BackEnd_Test.yml
    secrets: inherit

  FrontEnd_Test:
    uses: ./.github/workflows/Integration_FrontEnd_Test.yml
    secrets: inherit