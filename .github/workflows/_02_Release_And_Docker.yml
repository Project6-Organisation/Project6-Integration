name: Release_And_Docker

on:
  workflow_call:    
    
permissions:
  contents: write
  packages: write
  issues: write
  pull-requests: write
  
jobs:
  
  Check-variables:
    
    runs-on: [self-hosted, project6]
    
    steps:      
            
      - name: Show caller & called workflow branch
        run: |
          echo "Triggered by : ${{ github.event_name }}"
          echo "Action       : ${{ github.event.action }}"

          echo "github.base_ref: ${{ github.base_ref }}"
          echo "github.head_ref: ${{ github.head_ref }}"

          if [ "${{ inputs.origin }}" == "manual-trigger" ]; then
            echo "Caller branch: ${{ github.ref_name }}"
            echo "Called pipeline branch: develop"
          else
            echo "Caller branch: ${{ github.ref_name }}"
            echo "Called pipeline branch: main"
          fi
  
  Semantic_Release:

    runs-on: [self-hosted, project6]
    
    outputs:
      is_release: ${{ steps.compute-image-tag.outputs.is_release }}
      release_version: ${{ steps.semantic-release.outputs.new_release_version }}
      image_tag: ${{ steps.compute-image-tag.outputs.image_tag }}
    
    steps:

      - name: Checkout repository Application
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis
          path: application

      - name: Checkout repository Integration
        uses: actions/checkout@v6
        with:
          repository: Project6-Organisation/Project6-Integration
          path: integration

      - name: Copy semantic-release config
        run: |
          cp integration/release.config.cjs \
            application/front/release.config.cjs

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: application/front/package-lock.json

      - name: Install Semantic Release
        working-directory: application/front
        run: |
          npm ci
          npm install --save-dev \
            semantic-release \
            @semantic-release/github
            # @semantic-release/changelog \
            # @semantic-release/git \

      - name: Semantic Release
        id: semantic-release
        working-directory: application/front
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BEFORE_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")

          npx semantic-release

          AFTER_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")

          if [ "$BEFORE_TAG" != "$AFTER_TAG" ]; then
            echo "New release published"
            echo "new_release_published=true" >> "$GITHUB_OUTPUT"
            echo "new_release_version=${AFTER_TAG#v}" >> "$GITHUB_OUTPUT"
          else
            echo "No new release published"
            echo "new_release_published=false" >> "$GITHUB_OUTPUT"
            echo "new_release_version=" >> "$GITHUB_OUTPUT"
          fi
           
      - name: Compute image tag
        id: compute-image-tag
        run: |
          if [ "${{ steps.semantic-release.outputs.new_release_published }}" = "true" ]; then
            image_tag="v${{ steps.semantic-release.outputs.new_release_version }}"
            is_release="true"
          else
            image_tag="${GITHUB_REF_NAME}-${GITHUB_SHA::7}"
            is_release="false"
          fi

          echo "Computed image tag: $image_tag"
          echo "Is release: $is_release"
          
          echo "image_tag=$image_tag" >> "$GITHUB_OUTPUT"
          echo "is_release=$is_release" >> "$GITHUB_OUTPUT"
            
      - name: Display computed outputs
        run: |
          echo "image_tag = ${{ steps.compute-image-tag.outputs.image_tag }}"
          echo "is_release = ${{ steps.compute-image-tag.outputs.is_release }}"

