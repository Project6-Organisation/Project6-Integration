name: Integration_BackEnd_Build

on:
  workflow_call:
    secrets:
        SONAR_TOKEN:
          required: true

jobs:
  BackEnd_Build:
    
    name: Build BackEnd application
    
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./back
    
    steps:

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis

      - name: Check Java version
        run: |
          which java
          java -version
          echo $JAVA_HOME

      - name: Fix Gradle wrapper permission
        run: chmod +x ./gradlew
      
      - name: Cache Gradle
        uses: actions/cache@v4
        if: success()
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
         
      - name: Cache SonarQube packages
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar
      
      - name: Build BackEnd application and analyze
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          echo "Building BackEnd application"
          ./gradlew clean build -x test sonar --info -Dsonar.qualitygate.wait=true

      # - name: Display SonarQube Quality Gate summary
      #   env:
      #     SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      #   run: |
      #     PROJECT_KEY="Project6-Organisation_Project6-Application"
      #     BRANCH="${GITHUB_REF_NAME}"

      #     curl -s -u "$SONAR_TOKEN:" \
      #       "https://sonarcloud.io/api/qualitygates/project_status?projectKey=$PROJECT_KEY&branch=$BRANCH" \
      #       | jq -r '
      #         .projectStatus.conditions[]
      #         | "\(.metricKey): \(.status) - actual=\(.actualValue // "n/a") threshold=\(.errorThreshold // "n/a")"
      #       '

      - name: Display SonarQube Quality Gate summary
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          PROJECT_KEY="Project6-Organisation_Project6-Application"
          BRANCH="${GITHUB_REF_NAME}"

          echo "========================================"
          echo "SONARQUBE QUALITY GATE"
          echo "========================================"

          RESPONSE=$(curl -s -u "$SONAR_TOKEN:" \
            "https://sonarcloud.io/api/qualitygates/project_status?projectKey=$PROJECT_KEY&branch=$BRANCH")

          STATUS=$(echo "$RESPONSE" | jq -r '.projectStatus.status')

          echo "QUALITY GATE STATUS: $STATUS"
          echo ""

          echo "$RESPONSE" | jq -r '
            .projectStatus.conditions[]
            | if .metricKey == "new_coverage" then
                "Coverage >= " + .errorThreshold + "%                " + (if .status == "OK" then "✅" else "❌" end) + " actual=" + (.actualValue // "n/a") + "%"
              elif .metricKey == "new_duplicated_lines_density" then
                "Duplications <= " + .errorThreshold + "%             " + (if .status == "OK" then "✅" else "❌" end) + " actual=" + (.actualValue // "n/a") + "%"
              elif .metricKey == "new_maintainability_rating" then
                "Maintainability Rating = A     " + (if .status == "OK" then "✅" else "❌" end)
              elif .metricKey == "new_reliability_rating" then
                "Reliability Rating = A         " + (if .status == "OK" then "✅" else "❌" end)
              elif .metricKey == "new_security_rating" then
                "Security Rating = A            " + (if .status == "OK" then "✅" else "❌" end)
              elif .metricKey == "new_security_hotspots_reviewed" then
                "Security Hotspots Reviewed     " + (if .status == "OK" then "✅" else "❌" end) + " actual=" + (.actualValue // "n/a") + "%"
              else
                empty
              end
          '

          echo "========================================"

          if [ "$STATUS" != "OK" ]; then
            echo "Quality Gate failed"
            exit 1
          fi